# Local infra + gateway. `docker compose up` brings up redis, postgres, runs
# migrations once, then starts the gateway. Values interpolate from a local
# .env if present (see .env.example) and fall back to dev-safe defaults.
#
# Security: every published port binds to 127.0.0.1 (loopback), so the gateway,
# dashboard, and datastores are reachable only from this machine — not the LAN.
# To expose the dashboard/control plane to a team, put it behind a reverse proxy
# that adds authentication (see docs/security.md). Never publish the admin
# control plane directly to the public internet.

services:
  redis:
    image: redis:7-alpine
    ports:
      # Loopback-only. Host port is configurable to avoid clashes with a local/other Redis.
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    # pgvector image (Postgres 16 + the `vector` extension) for semantic caching.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gw
      POSTGRES_PASSWORD: gw
      POSTGRES_DB: aigateway
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gw -d aigateway"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: applies pending migrations, then exits 0.
  migrate:
    build: .
    entrypoint: ["/app/migrate"]
    environment:
      DATABASE_URL: postgres://gw:gw@postgres:5432/aigateway?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    build: .
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://gw:gw@postgres:5432/aigateway?sslmode=disable
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      CACHE_SCOPE: ${CACHE_SCOPE:-key}
      PRICING_PATH: /app/pricing.yaml
      # Routing & failover
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      FAILOVER_ENABLED: ${FAILOVER_ENABLED:-true}
      FAILOVER_PROVIDER: ${FAILOVER_PROVIDER:-}
      FAILOVER_MODEL: ${FAILOVER_MODEL:-}
      # Semantic cache (opt-in)
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      SEMANTIC_THRESHOLD: ${SEMANTIC_THRESHOLD:-0.25}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  dashboard:
    build: ./dashboard
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3000}:3000"
    environment:
      # Server-side only: the dashboard reaches the gateway over the compose
      # network and holds ADMIN_TOKEN so the browser never sees it.
      GATEWAY_URL: http://gateway:8080
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
